<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>看護助手 CareTaiwan — 互動原型 Demo</title>
<meta name="description" content="台灣外籍看護的日常記錄＋家屬 LINE 溝通工具｜雙端互動原型（示意資料）">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --font:'Noto Sans TC',system-ui,-apple-system,sans-serif;
  --display:'Plus Jakarta Sans','Noto Sans TC',system-ui,sans-serif;
  --stage:#dbe4f0; --phone:#f3f6fb; --card:#ffffff; --surface:#eef3fa;
  --ink:#142036; --muted:#5d6b85; --hint:#95a1ba; --line:#e6ecf6;
  --accent:#2563eb; --accent-deep:#1d4ed8; --chip:#e8f0fe;
  --hero:linear-gradient(155deg,#2f6df0 0%,#1b46b8 100%);
  --care:linear-gradient(155deg,#2f6df0 0%,#1b46b8 100%);
  --fam:linear-gradient(155deg,#0e9f7e 0%,#0a6e5c 100%);
  --fam-accent:#0e9f7e;
  --sh:0 6px 22px rgba(20,50,110,.10); --sh-sm:0 3px 10px rgba(20,50,110,.07);
  --nav-sh:0 -4px 20px rgba(20,50,110,.06); --phone-sh:0 24px 70px rgba(20,50,110,.28);
  --ok-bg:#e3f4ea; --ok-tx:#15803d; --warn-bg:#fdf1da; --warn-tx:#b9740c;
  --bad-bg:#fcebea; --bad-tx:#c0392b; --info-bg:#e8f0fe; --info-tx:#2563eb;
  --phone-h:872px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--stage);font-family:var(--font);color:var(--ink);line-height:1.5;-webkit-font-smoothing:antialiased}
.stage{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px 0 40px}
.lead{max-width:392px;width:100%;padding:0 16px 14px;text-align:center}
.lead h1{font-family:var(--display);font-weight:800;font-size:19px;color:#22304d}
.lead p{font-size:12px;color:#5d6b85;margin-top:4px;line-height:1.6}
.phone{position:relative;width:392px;max-width:100%;height:var(--phone-h);background:var(--phone);border-radius:42px;overflow:hidden;border:1px solid #ccd6e6;box-shadow:var(--phone-sh)}
button{font-family:inherit;cursor:pointer}
.icn{display:block}
.emoji{font-style:normal;line-height:1}

/* device chrome */
.statusbar{position:absolute;top:0;left:0;right:0;height:46px;display:flex;align-items:center;justify-content:space-between;padding:0 26px;z-index:90;pointer-events:none;color:#fff}
.statusbar.dark{color:var(--ink)}
.sb-time{font-family:var(--display);font-weight:700;font-size:15px;letter-spacing:.3px}
.sb-island{position:absolute;left:50%;transform:translateX(-50%);top:10px;width:92px;height:26px;background:#0a0e16;border-radius:14px}
.sb-ic{display:flex;align-items:center;gap:6px}
.homebar{position:absolute;bottom:9px;left:50%;transform:translateX(-50%);width:134px;height:5px;border-radius:3px;background:var(--ink);opacity:.22;z-index:80;pointer-events:none}

/* screen */
.screen{position:absolute;top:0;left:0;right:0;bottom:0;overflow-y:auto;-webkit-overflow-scrolling:touch}
.screen::-webkit-scrollbar{width:0}
.scroll{padding-bottom:170px}

/* hero header */
.hero{color:#fff;padding:56px 20px 30px;border-radius:0 0 30px 30px}
.hero.care{background:var(--care)} .hero.fam{background:var(--fam)}
.hero-top{display:flex;align-items:center;justify-content:space-between;gap:10px}
.brand{display:flex;align-items:center;gap:9px;min-width:0}
.brand-logo{width:38px;height:38px;border-radius:12px;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;flex:none}
.brand-tt{min-width:0}
.brand-tt b{font-family:var(--display);font-weight:800;font-size:17px;display:block;line-height:1.15}
.brand-tt span{font-size:11px;color:rgba(255,255,255,.82)}
.hero-acts{display:flex;align-items:center;gap:8px;flex:none}
.hbtn{width:36px;height:36px;border-radius:11px;background:rgba(255,255,255,.16);border:0;color:#fff;display:flex;align-items:center;justify-content:center;position:relative}
.lang{font-size:11.5px;font-weight:700;padding:0 11px;width:auto;height:36px;border-radius:999px;gap:5px}
.lang b{font-family:var(--display)}
.demopill{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;background:rgba(255,255,255,.18);padding:4px 10px;border-radius:999px;font-weight:700;margin-top:16px}
.greet{margin-top:13px;font-size:21px;font-weight:700;line-height:1.35}
.greet small{display:block;font-size:12px;font-weight:400;color:rgba(255,255,255,.82);margin-top:5px}

/* role switch (segmented, floating) */
.roleseg{display:flex;gap:2px;width:fit-content;margin:0 auto 16px;background:rgba(255,255,255,.18);border-radius:999px;padding:3px}
.roleseg button{border:0;background:none;color:rgba(255,255,255,.85);font-size:12px;font-weight:700;padding:7px 16px;border-radius:999px;white-space:nowrap}
.roleseg button.on{background:#fff;color:var(--accent)}
.hero.fam .roleseg button.on{color:var(--fam-accent)}

/* generic cards */
.wrap{padding:0 16px}
.lift{background:var(--card);border:1px solid var(--line);border-radius:18px;box-shadow:var(--sh-sm)}
.float{margin:-20px 16px 0;position:relative;z-index:5}
.sect{padding:20px 16px 0}
.sect-h{display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:700;color:var(--muted);margin-bottom:11px;letter-spacing:.2px}
.sect-h .more{color:var(--accent);font-size:12px}

/* today summary */
.today{display:flex;align-items:center;gap:13px;padding:15px;border-radius:20px;background:linear-gradient(135deg,#e7fbf2,#d3f3e6);border:1px solid #c6efdc}
.today .ic{width:48px;height:48px;border-radius:15px;background:#fff;display:flex;align-items:center;justify-content:center;color:#0e9f7e;flex:none;box-shadow:var(--sh-sm)}
.today b{font-size:16px;font-weight:700;color:#0c5e4c;font-family:var(--display)}
.today p{font-size:11.5px;color:#1c7a63;margin-top:2px}
.today .ch{margin-left:auto;color:#0e9f7e;font-size:20px}

/* quick tiles */
.tiles{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.tile{display:flex;flex-direction:column;border-radius:22px;padding:15px;border:1px solid var(--line);box-shadow:var(--sh-sm);text-align:left;background:var(--card)}
.tile .ic{width:50px;height:50px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:24px;margin-bottom:auto}
.tile .tl{font-size:15px;font-weight:700;margin-top:14px}
.tile .ts{font-size:11px;color:var(--muted);margin-top:2px;line-height:1.4}
.tile.primary{outline:2px solid var(--accent);outline-offset:-2px}
.bigrow{display:flex;align-items:center;gap:12px;padding:14px;border-radius:18px;margin-top:11px}
.bigrow .ic{width:42px;height:42px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:20px;flex:none}
.bigrow .tl{font-size:14px;font-weight:700}.bigrow .ts{font-size:11px;color:var(--muted);margin-top:1px}
.bigrow .ch{margin-left:auto;color:var(--hint);font-size:18px}

/* recent record rows */
.rrow{display:flex;align-items:center;gap:12px;padding:12px 13px;border-radius:16px;margin-bottom:9px}
.rrow .ic{width:42px;height:42px;border-radius:13px;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:21px;flex:none}
.rrow .tl{font-size:14px;font-weight:700;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.rrow .val{color:var(--muted);font-weight:500}
.rrow .nt{font-size:11.5px;color:var(--muted);margin-top:2px}
.rrow .tm{margin-left:auto;font-size:11px;color:var(--hint);white-space:nowrap;flex:none}
.tag{font-size:10px;font-weight:700;padding:2px 7px;border-radius:6px}
.tag.share{background:var(--ok-bg);color:var(--ok-tx)}
.tag.grp{background:var(--info-bg);color:var(--info-tx)}

/* RECORD grid */
.rgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:11px}
.rcell{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;background:var(--card);border:1px solid var(--line);border-radius:20px;padding:18px 6px;box-shadow:var(--sh-sm);transition:transform .08s}
.rcell:active{transform:scale(.94)}
.rcell .e{font-size:30px}
.rcell .l{font-size:13px;font-weight:700;text-align:center;line-height:1.2}
.rcell.more{background:var(--surface);border-style:dashed}
.subhint{font-size:11.5px;color:var(--muted);margin:8px 2px 0;display:flex;gap:6px;align-items:flex-start;line-height:1.55}
.grp-lab{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:.5px;margin:18px 2px 10px}

/* keypad / numeric overlay */
.kp{padding:8px 4px}
.kp-disp{display:flex;justify-content:center;gap:10px;margin:6px 0 18px}
.kp-box{min-width:96px;background:var(--surface);border-radius:16px;padding:14px 10px;text-align:center;border:2px solid transparent}
.kp-box.on{border-color:var(--accent);background:#fff}
.kp-box .v{font-family:var(--display);font-size:32px;font-weight:800;color:var(--ink);line-height:1}
.kp-box .u{font-size:11px;color:var(--muted);margin-top:5px}
.kp-box .lab{font-size:10.5px;color:var(--hint);margin-bottom:6px}
.kp-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
.kp-key{background:var(--card);border:1px solid var(--line);border-radius:15px;padding:15px;font-family:var(--display);font-size:21px;font-weight:700;box-shadow:var(--sh-sm)}
.kp-key:active{background:var(--surface)}
.kp-key.fn{color:var(--accent);font-size:15px;font-weight:700}

/* note quick phrases */
.phrase-wrap{display:flex;gap:7px;flex-wrap:wrap;margin-top:10px}
.phrase{font-size:12px;background:var(--surface);color:var(--ink);border:1px solid var(--line);padding:7px 12px;border-radius:999px}
.phrase.on{background:var(--chip);border-color:var(--accent);color:var(--accent-deep);font-weight:700}

/* share sheet rows */
.share-opt{display:flex;align-items:center;gap:12px;width:100%;background:var(--card);border:1px solid var(--line);border-radius:16px;padding:14px;text-align:left;margin-bottom:9px}
.share-opt .ic{width:40px;height:40px;border-radius:13px;display:flex;align-items:center;justify-content:center;font-size:19px;flex:none}
.share-opt .tl{font-size:14px;font-weight:700}.share-opt .ts{font-size:11px;color:var(--muted);margin-top:1px}
.share-opt .rd{margin-left:auto;width:22px;height:22px;border-radius:50%;border:2px solid var(--line);flex:none;display:flex;align-items:center;justify-content:center}
.share-opt.on{border-color:var(--accent);background:var(--chip)}
.share-opt.on .rd{border-color:var(--accent);background:var(--accent);color:#fff}

/* medical card */
.mcard{border-radius:22px;overflow:hidden;border:1px solid var(--line);box-shadow:var(--sh)}
.mcard-top{background:var(--care);color:#fff;padding:18px 18px 20px}
.mcard.fam .mcard-top{background:var(--fam)}
.mcard-name{font-family:var(--display);font-size:21px;font-weight:800}
.mcard-meta{font-size:12px;color:rgba(255,255,255,.85);margin-top:3px}
.mcard-chips{display:flex;gap:7px;margin-top:13px;flex-wrap:wrap}
.mchip{font-size:11px;font-weight:700;background:rgba(255,255,255,.18);padding:5px 11px;border-radius:999px}
.kv{background:var(--card);padding:2px 16px}
.kv-row{display:flex;justify-content:space-between;gap:14px;padding:13px 0;border-bottom:1px solid var(--line);align-items:flex-start}
.kv-row:last-child{border-bottom:0}
.kv-k{font-size:12.5px;color:var(--muted);flex:none}
.kv-v{font-size:13px;font-weight:600;text-align:right}
.kv-v.bad{color:var(--bad-tx)}
.pairbox{background:var(--surface);border-radius:16px;padding:15px;text-align:center;margin-top:14px}
.pairbox .lab{font-size:11.5px;color:var(--muted)}
.pairbox .code{font-family:var(--display);font-size:30px;font-weight:800;letter-spacing:7px;color:var(--accent);margin-top:6px}
.pairbox.grp .code{color:var(--fam-accent)}

/* contacts */
.crow{display:flex;align-items:center;gap:13px;padding:13px;border-radius:15px;margin-bottom:9px}
.crow .ic{width:40px;height:40px;border-radius:13px;background:var(--bad-bg);color:var(--bad-tx);display:flex;align-items:center;justify-content:center;flex:none}
.crow .tl{font-size:14px;font-weight:700}.crow .ts{font-size:11px;color:var(--muted)}
.crow .num{margin-left:auto;font-family:var(--display);font-size:17px;font-weight:800;color:var(--bad-tx)}

/* expense */
.exp{display:flex;align-items:center;gap:12px;padding:13px;border-radius:16px;margin-bottom:9px}
.exp .ic{width:42px;height:42px;border-radius:13px;background:var(--surface);display:flex;align-items:center;justify-content:center;font-size:20px;flex:none}
.exp .tl{font-size:14px;font-weight:700}.exp .ts{font-size:11px;color:var(--muted);margin-top:1px}
.exp .amt{margin-left:auto;text-align:right;flex:none}
.exp .amt b{font-family:var(--display);font-size:16px;font-weight:800}
.st{font-size:10px;font-weight:700;padding:2px 8px;border-radius:7px;display:inline-block;margin-top:3px}
.st.confirmed{background:var(--ok-bg);color:var(--ok-tx)}
.st.pending{background:var(--warn-bg);color:var(--warn-tx)}
.st.disputed{background:var(--bad-bg);color:var(--bad-tx)}
.exp-sum{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-radius:16px;background:var(--surface);margin-bottom:14px}
.exp-sum .t{font-size:12px;color:var(--muted)}
.exp-sum .n{font-family:var(--display);font-size:22px;font-weight:800;color:var(--accent)}
.verify-btns{display:flex;gap:9px;margin-top:11px}
.vbtn{flex:1;border:0;border-radius:13px;padding:12px;font-size:13.5px;font-weight:700}
.vbtn.ok{background:var(--fam-accent);color:#fff}
.vbtn.no{background:var(--bad-bg);color:var(--bad-tx)}

/* LINE feed (family) */
.linehd{display:flex;align-items:center;gap:11px;padding:14px 16px;background:#06c755;color:#fff;border-radius:0 0 0 0}
.linehd .av{width:40px;height:40px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;flex:none}
.linehd b{font-size:15px;font-weight:700}.linehd span{font-size:11px;color:rgba(255,255,255,.9)}
.chat{background:#8fb7c9;background:linear-gradient(180deg,#9ec0d2,#8fb7c9);padding:16px 14px 24px;min-height:340px}
.daysep{text-align:center;margin:4px 0 14px}
.daysep span{font-size:10.5px;background:rgba(0,0,0,.16);color:#fff;padding:3px 12px;border-radius:999px}
.bub{display:flex;gap:9px;margin-bottom:13px;align-items:flex-end}
.bub .av{width:34px;height:34px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;font-size:17px;flex:none}
.bub .body{max-width:74%}
.bub .name{font-size:10.5px;color:rgba(255,255,255,.92);margin:0 0 3px 3px}
.bub .msg{background:#fff;border-radius:5px 16px 16px 16px;padding:11px 13px;font-size:13px;box-shadow:0 1px 2px rgba(0,0,0,.12)}
.bub .msg .big{font-weight:700;font-size:13.5px;display:block}
.bub .msg .sub{color:var(--muted);font-size:11.5px;margin-top:4px;line-height:1.5}
.bub .tm{font-size:9.5px;color:rgba(255,255,255,.85);align-self:flex-end;margin-bottom:2px}
.bub .msg.act{border:1px solid #ffe2b0;background:#fffbf2}
.bub .msg .actbtn{margin-top:9px;width:100%;background:#06c755;color:#fff;border:0;border-radius:9px;padding:8px;font-size:12px;font-weight:700}

/* tab bar */
.tabbar{position:absolute;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--line);box-shadow:var(--nav-sh);display:flex;align-items:center;justify-content:space-around;padding:9px 10px 22px;z-index:40}
.tab{flex:0 1 auto;border:0;background:none;display:flex;align-items:center;gap:7px;color:var(--muted);padding:9px 11px;border-radius:999px;font-size:13px;font-weight:700}
.tab .e{font-size:20px}
.tab span:not(.e){display:none}
.tab.on{background:var(--accent);color:#fff;padding:9px 16px}
.tab.on span{display:inline}
.fam .tab.on{background:var(--fam-accent)}

/* overlay sheet */
.sheet{position:absolute;inset:0;background:rgba(10,24,52,.46);z-index:60;display:flex;align-items:flex-end}
.sheet-card{background:var(--phone);width:100%;border-radius:24px 24px 0 0;padding:8px 18px 28px;max-height:88%;overflow-y:auto;animation:up .24s ease}
.sheet-card::-webkit-scrollbar{width:0}
@keyframes up{from{transform:translateY(40px)}to{transform:none}}
.grab{width:40px;height:5px;border-radius:3px;background:var(--line);margin:6px auto 14px}
.sheet-h{display:flex;align-items:center;gap:11px;margin-bottom:16px}
.sheet-h .e{font-size:26px}
.sheet-h .tl{font-size:18px;font-weight:800;font-family:var(--display)}
.sheet-h .ts{font-size:11.5px;color:var(--muted)}
.sheet-h .x{margin-left:auto;width:34px;height:34px;border-radius:11px;background:var(--surface);border:0;color:var(--ink);display:flex;align-items:center;justify-content:center;flex:none}
.cta{width:100%;background:var(--accent);color:#fff;border:0;border-radius:15px;padding:15px;font-size:15px;font-weight:800;margin-top:8px;box-shadow:0 6px 16px rgba(37,99,235,.32)}
.cta.fam{background:var(--fam-accent);box-shadow:0 6px 16px rgba(14,159,126,.32)}
.ghost{width:100%;background:none;border:0;color:var(--muted);font-size:13px;padding:13px;margin-top:2px}

/* toast */
.toast{position:absolute;left:18px;right:18px;bottom:104px;background:var(--ink);color:#fff;padding:14px 16px;border-radius:15px;font-size:13px;z-index:95;display:flex;align-items:center;gap:10px;box-shadow:0 10px 30px rgba(10,20,40,.4);animation:up .22s ease}
.toast .ic{color:#7ee0a8;flex:none}

/* welcome */
.welcome{position:absolute;inset:0;background:var(--care);color:#fff;z-index:100;display:flex;flex-direction:column;justify-content:center;padding:46px 28px;overflow-y:auto}
.welcome::-webkit-scrollbar{width:0}
.w-logo{width:74px;height:74px;border-radius:22px;background:rgba(255,255,255,.16);display:flex;align-items:center;justify-content:center;margin:0 auto 18px}
.w-t{font-family:var(--display);font-size:26px;font-weight:800;text-align:center}
.w-s{font-size:13px;color:rgba(255,255,255,.85);text-align:center;margin-top:10px;line-height:1.65}
.w-list{margin:26px 0;display:flex;flex-direction:column;gap:15px}
.w-item{display:flex;gap:13px;align-items:flex-start}
.w-item .n{width:32px;height:32px;border-radius:10px;background:rgba(255,255,255,.16);display:flex;align-items:center;justify-content:center;font-size:17px;flex:none}
.w-item b{font-size:14px;font-weight:700}
.w-item p{font-size:12px;color:rgba(255,255,255,.82);margin-top:2px;line-height:1.5}
.w-btn{background:#fff;color:var(--accent);border:0;border-radius:16px;padding:16px;font-size:16px;font-weight:800;width:100%}
.w-note{font-size:10.5px;color:rgba(255,255,255,.72);text-align:center;margin-top:16px;line-height:1.6}

.backbtn{background:rgba(255,255,255,.2);border:0;color:#fff;font-size:13px;font-weight:700;padding:7px 13px;border-radius:999px}
.enc{display:flex;gap:11px;align-items:flex-start;background:var(--info-bg);border:1px solid #cfe0fd;border-radius:16px;padding:14px;margin-top:14px;color:var(--accent-deep)}
.enc b{font-size:13px;font-weight:700}.enc p{font-size:11.5px;color:#3b5bb5;margin-top:3px;line-height:1.55}
.ecall{display:flex;align-items:center;gap:13px;width:100%;background:var(--card);border:1px solid var(--line);border-radius:18px;padding:15px;margin-bottom:10px;box-shadow:var(--sh-sm)}
.ecall:active{transform:scale(.98)}
.ecall .ec-ic{width:46px;height:46px;border-radius:14px;background:var(--bad-bg);color:var(--bad-tx);display:flex;align-items:center;justify-content:center;flex:none}
.ecall .ec-n{font-size:15px;font-weight:700}.ecall .ec-d{font-size:11.5px;color:var(--muted);margin-top:1px}
.ecall .ec-p{font-family:var(--display);font-size:16px;font-weight:800;color:var(--bad-tx);flex:none}
.ecall.big{background:linear-gradient(135deg,#fff,#fdecec);border-color:#f6cccc}

function render(){
  var html='';
  if(S.welcome){ document.getElementById('app').innerHTML = welcomeHTML(); bind(); return; }
  var fam = S.role==='fam';
  html += chrome(false);
  html += '<div class="screen '+(fam?'fam':'')+'"><div class="scroll">';
  if(fam){ html += famScreen(); } else { html += careScreen(); }
  html += '</div></div>';
  html += tabbar();
  if(S.sheet) html += sheetHTML();
  if(S.toast) html += '<div class="toast">'+ic('check',18)+'<div>'+S.toast+'</div></div>';
  html += '<div class="homebar"></div>';
  document.getElementById('app').className='phone'+(fam?' fam':'');
  document.getElementById('app').innerHTML = html;

}

function trendCard(title,unit,vals,min,max,color,note){
  var last=vals[vals.length-1];
  return '<div class="lift" style="padding:15px 16px"><div style="display:flex;align-items:baseline;justify-content:space-between">'

    +sparkline(vals,min,max,color)
    +'<div style="font-size:11.5px;color:var(--muted);margin-top:8px">'+note+'</div></div>';
}
function sparkline(vals,min,max,color){
  var W=300,H=64,n=vals.length,pad=5;
  var pts=vals.map(function(v,i){var x=pad+(W-2*pad)*i/(n-1);var y=H-pad-(H-2*pad)*(v-min)/(max-min);return [x,y];});
  var poly=pts.map(function(p){return p[0].toFixed(1)+','+p[1].toFixed(1);}).join(' ');
  var area='M'+pad+','+H+' ';
  pts.forEach(function(p){area+='L'+p[0].toFixed(1)+','+p[1].toFixed(1)+' ';});
  area+='L'+(W-pad)+','+H+' Z';
  var dots=pts.map(function(p){return '<circle cx="'+p[0].toFixed(1)+'" cy="'+p[1].toFixed(1)+'" r="3" fill="'+color+'"/>';}).join('');
  var gid='grad'+Math.round(min)+'x'+Math.round(max);
  return '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:64px;margin-top:10px;display:block"><defs><linearGradient id="'+gid+'" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="'+color+'" stop-opacity=".22"/><stop offset="1" stop-color="'+color+'" stop-opacity="0"/></linearGradient></defs>'
    +'<path d="'+area+'" fill="url(#'+gid+')"/>'
    +'<polyline points="'+poly+'" fill="none" stroke="'+color+'" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>'+dots+'</svg>';
}

/* ---------- toast ---------- */

/* ---------- events ---------- */
function bind(){
  var app=document.getElementById('app');
  app.onclick=function(ev){
    var el=ev.target.closest('[data-act]'); if(!el) return;
    var a=el.getAttribute('data-act'), v=el.getAttribute('data-v');
    if(a==='close' && ev.target.closest('[data-stop]') && !ev.target.closest('[data-act="close"]')) return;
    switch(a){
      case 'enter': S.welcome=false; render(); break;
      case 'role': S.role=v; S.tab=0; S.page=null; S.sheet=null; render(); break;
      case 'lang': S.lang = S.lang==='zh'?'vi':S.lang==='vi'?'id':'zh'; render(); break;
      case 'tab': S.tab=parseInt(v,10); S.page=null; S.sheet=null; render(); break;
      case 'tile':
        if(v==='1'){ S.tab=1; render(); }
        else if(v==='2'){ S.tab=2; render(); }
        else if(v==='bak'){ S.page='backup'; render(); }
        else if(v==='help'){ S.page='emergency'; render(); }
        break;
      case 'bell': toast('🔔 沒有新通知'); break;
      case 'call': toast('📞 撥號中…（示意，不會真的撥出）'); break;
      case 'more': S.sheet={type:'more'}; render(); break;
      case 'rec': startRec(el.getAttribute('data-k')); break;
      case 'kpkey': kpKey(el.getAttribute('data-key')); break;
      case 'kpdone': kpDone(); break;
      case 'phrase': S.sheet.note = (S.sheet.note===v?'':v); render(); break;
      case 'share': S.sheet.share=v; render(); break;
      case 'recdone': recDone(); break;
      case 'verify': doVerify(parseInt(el.getAttribute('data-i'),10), v); break;
      case 'addexp': S.sheet={type:'addexp'}; render(); break;
      case 'demoexp': addDemoExp(); break;
      case 'back': S.page=null; render(); break;
      case 'dobackup': toast('☁️ 已加密備份到雲端（示意）'); break;
      case 'restore': toast('📥 已從雲端還原 1,284 筆記錄（示意）'); break;
      case 'close': S.sheet=null; render(); break;
    }
  };
}
function startRec(k){
  var ty=TYPE[k];
  if(ty.num){ S.sheet={type:'keypad',k:k,v:[''],field:0}; }
  else { S.sheet={type:'share',k:k,val:'',note:'',share:'family'}; }
  render();
}
function kpKey(key){
  var s=S.sheet, f=s.field||0;
  var cur=s.v[f]||'';
  if(key==='⌫'){ cur=cur.slice(0,-1); }
  else if(key==='.'){ if(s.k==='temp' && cur.indexOf('.')<0 && cur) cur+='.'; }
  else { var max = s.k==='temp'?4:3; if(cur.length<max) cur+=key; }
  s.v[f]=cur;
  // 血壓收縮壓滿 3 碼自動跳舒張壓
  if(s.k==='bp' && f===0 && cur.length>=3){ s.field=1; }
  render();
}
function kpDone(){
  var s=S.sheet, val;
  if(s.k==='bp'){ val=(s.v[0]||'120')+'/'+(s.v[1]||'80'); }
  else { val=s.v[0]||(s.k==='temp'?'36.5':s.k==='glucose'?'110':'98'); }
  S.sheet={type:'share',k:s.k,val:val,note:'',share:'family'};
  render();
}
function recDone(){
  var s=S.sheet;
  var ty=TYPE[s.k];
  // 加到最近記錄
  DATA.recent.unshift({k:s.k,val:s.val,note:s.note,t:'剛剛',share:s.share});
  DATA.recent=DATA.recent.slice(0,4);
  todayN++;
  // 推播到家屬端 feed
  if(s.share){
    todayShared++;
    var big=ty.e+' '+label(s.k)+(s.val?' '+s.val+(UNIT[s.k]||''):'');
    feed.push({k:s.k,big:big,sub:s.note||'',t:'剛剛'});

  S.sheet=null;
  var msg = s.share==='group' ? '✅ 已記錄並送到家族群組' : s.share==='family' ? '✅ 已記錄並傳給家屬 LINE' : '✅ 已記錄（只存本機）';
  toast(msg);
}
